<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LorentzArena</title>
    <style>
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .status {
            padding: 10px;
            margin-bottom: 20px;
            background-color: #f0f0f0;
            border-radius: 4px;
        }
        .game-area {
            border: 1px solid #ccc;
            padding: 20px;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status" id="connectionStatus">
            接続状態: 未接続
        </div>
        
        <div class="game-area">
            <h2>ゲームエリア</h2>
            <!-- ここにゲームのキャンバスなどを追加予定 -->
        </div>

        <div class="controls">
            <button id="connectButton">接続開始</button>
            <button id="sendTestMessage">テストメッセージ送信</button>
        </div>

        <div id="messages">
            <!-- メッセージログ表示エリア -->
        </div>
    </div>

    <script type="module" src="./index.ts"></script>
</body>
</html>
